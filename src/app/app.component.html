<div class="mat-elevation-z2 table-container">
  <mdt-dynamic-table [caption]="title"
                     [columns]="columns"
                     [controlsPosition]="controlsPosition"
                     [chipSearchToggle]="chipSearchToggle"
                     [dataSource]="dataSource"
                     [showFirstLastButton]="true"
                     [showSearch]="showSearch"
                     [stickyHeader]="true"
                     [pageSize]="2"
                     [pageSizeOptions]="[2, 4, 6, 8]"
                     [sortDirection]="'desc'"
                     (rowClick)="onRowClick($event)"
                     [showFilters]="showFilters">
    <ng-container *ngIf="showCustomIcons">
      <ng-template mdtSetColumnFilterIcon>
        <mat-icon svgIcon="custom:filter"></mat-icon>
      </ng-template>
      <ng-template mdtResetFilterIcon>
        <mat-icon svgIcon="custom:hatch-filter"></mat-icon>
      </ng-template>
    </ng-container>
  </mdt-dynamic-table>
</div>

<div class="buttons">
  <button mat-button (click)="toggleShowSearch()">{{showSearch ? 'Hide' : 'Show'}} search</button>
  <button mat-button (click)="toggleShowFilters()">{{showFilters ? 'Hide' : 'Show'}} filters</button>
  <button mat-button [disabled]="!showFilters" (click)="clearFilters()">Clear filters</button>
  <button mat-button [disabled]="!showFilters" (click)="setFilter()">Set filter</button>
  <button mat-button [disabled]="!showFilters" (click)="toggleIcons()">Toggle icons</button>
  <button mat-button (click)="toggleLocale()">Change moment locale (currently set to '{{locale | async}}')</button>
  <button mat-button (click)="switchTables()">Switch Table</button>


</div>
